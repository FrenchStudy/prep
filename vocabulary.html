<script>
    let allWords = [], filteredPool = [], currentIndex = 0;

    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => { 
            allWords = data; 
            console.log("Data loaded successfully.");
            // Only apply filters AFTER data is loaded
            applyFilters(); 
        });

    function applyFilters() {
        // Safe check: if elements don't exist, default to 'all'
        const levelEl = document.getElementById("level-filter");
        const typeEl = document.getElementById("type-filter");
        
        const lVal = levelEl ? levelEl.value.toLowerCase() : "all";
        const tVal = typeEl ? typeEl.value.toLowerCase() : "all";

        filteredPool = allWords.filter(w => {
            // Converts object to string to find any match
            const str = JSON.stringify(w).toLowerCase();
            return (lVal === "all" || str.includes(lVal)) && 
                   (tVal === "all" || str.includes(tVal));
        });

        currentIndex = 0;
        updateCardUI();
    }

    function updateCardUI() {
        const countEl = document.getElementById("pool-count");
        if(countEl) countEl.innerText = "Count: " + filteredPool.length;
        
        const wordEl = document.getElementById("word-display");
        if(filteredPool.length > 0 && wordEl) {
            wordEl.innerText = filteredPool[currentIndex].French;
        } else if (wordEl) {
            wordEl.innerText = "No matches found.";
        }
    }

    // This fixes your "reveal is not defined" error
    function reveal() {
        const revealArea = document.getElementById("reveal-area");
        if(revealArea) revealArea.classList.remove("hidden");
    }
</script>
