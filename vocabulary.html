<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCF 5,000 Frequency Suite</title>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --dark: #0F172A;
            --light: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-muted: #64748B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: #F1F5F9; 
            color: var(--dark); 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container { max-width: 1100px; width: 100%; }

        .header { 
            position: relative;
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%); 
            color: white; 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2); 
        }
        .header h1 { font-size: 2rem; margin-bottom: 6px; }
        .header p { font-size: 1rem; opacity: 0.9; }

        .return-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .return-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .workspace {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .workspace { grid-template-columns: 1fr; }
        }

        /* Settings Panel */
        .settings-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .settings-card h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #F1F5F9; padding-bottom: 10px; }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .filter-group select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #E2E8F0; font-size: 0.95rem; outline: none; }
        .filter-group select:focus { border-color: var(--primary); }

        .pool-counter {
            background: #EFF6FF;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed #BFDBFE;
        }
        .pool-counter p { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .pool-counter .count { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-top: 4px; }

        /* Flashcard Layout */
        .flashcard-wrapper {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 480px;
            position: relative;
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .rank-badge { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; }
        .level-badge { background: #EFF6FF; padding: 6px 14px; border-radius: 20px; color: var(--primary); font-weight: 700; font-size: 0.85rem; }

        .card-middle {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px 0;
        }

        .target-word { font-size: 3rem; font-weight: 800; color: var(--dark); margin-bottom: 6px; }
        .part-of-speech { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; }
        
        .translation-box { margin-top: 20px; width: 100%; text-align: center; }
        .meaning-text { font-size: 1.5rem; color: #059669; font-weight: 600; margin-bottom: 15px; }
        
        .example-sentence { 
            background: #F8FAFC; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.95rem; 
            margin-top: 8px; 
            border-left: 4px solid #3B82F6;
            text-align: left;
            max-width: 600px;
            width: 100%;
        }
        .example-en { color: var(--text-muted); font-style: italic; margin-top: 4px; font-size: 0.9rem; }

        .hidden { display: none !important; }

        /* Audio Interaction Elements */
        .audio-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        .icon-btn {
            background: #F1F5F9;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: #E2E8F0; transform: scale(1.05); }
        .icon-btn.active { background: #EF4444; color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .voice-feedback { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); min-height: 20px; margin-bottom: 10px; }
        .voice-success { color: #059669 !important; }

        .card-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .btn { padding: 14px 24px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; border: none; transition: all 0.2s; text-align: center; }
        .btn-dark { background: #1E293B; color: white; }
        .btn-dark:hover { background: #0F172A; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TCF 5,000 Frequency Suite</h1>
        <p>Active-recall filter matrix</p>
        <a href="index.html" class="return-btn">← Return Dashboard</a>
    </div>

    <div class="workspace">
        <!-- Sidebar Filter Component -->
        <div class="settings-card">
            <h2>Target Filter Settings</h2>
            
            <div class="filter-group">
                <label for="level-filter">CEFR Level</label>
                <select id="level-filter" onchange="applyFilters()">
                    <option value="all">All Levels (A1-C2)</option>
                    <option value="a1">A1 Level</option>
                    <option value="a2">A2 Level</option>
                    <option value="b1">B1 Level</option>
                    <option value="b2">B2 Level</option>
                    <option value="c1">C1 Level</option>
                    <option value="c2">C2 Level</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="type-filter">Part of Speech</label>
                <select id="type-filter" onchange="applyFilters()">
                    <option value="all">All Categories</option>
                    <option value="verb">Verbs Only</option>
                    <option value="noun">Nouns Only</option>
                    <option value="adjective">Adjectives Only</option>
                </select>
            </div>

            <div class="pool-counter">
                <p>Words in Active Filter Pool</p>
                <div id="pool-count" class="count">0</div>
            </div>
        </div>

        <!-- Main Workspace Component -->
        <div class="flashcard-wrapper">
            <div class="card-top">
                <div id="rank-display" class="rank-badge">RANK #0000</div>
                <div id="level-badge" class="level-badge">A1</div>
            </div>

            <div class="card-middle">
                <div id="word-display" class="target-word">Loading Base...</div>
                <div id="type-display" class="part-of-speech">VOCABULARY MATRIX</div>
                
                <!-- Interactive Controllers -->
                <div class="audio-controls">
                    <button class="icon-btn" onclick="playAudio()" title="Listen (Text to Speech)">🔊</button>
                    <button id="mic-btn" class="icon-btn" onclick="toggleVoiceCapture()" title="Check Pronunciation (Mic)">🎙️</button>
                </div>
                <div id="voice-feedback" class="voice-feedback"></div>

                <!-- Custom Translation & Context Box -->
                <div id="translation-display" class="translation-box hidden">
                    <div id="meaning-display" class="meaning-text">Translation</div>
                    <div id="sentence-box" class="example-sentence">
                        <div id="sentence-fr-display">French Sentence</div>
                        <div id="sentence-en-display" class="example-en">English Translation</div>
                    </div>
                </div>
            </div>

            <div class="card-bottom">
                <button class="btn btn-dark" onclick="revealTranslation()">Reveal Translation</button>
                <button class="btn btn-primary" onclick="nextWord()">Next Word →</button>
            </div>
        </div>
    </div>
</div>

<script>
    let allWords = []; 
    let filteredPool = [];
    let currentIndex = 0;
    let recognition = null;
    let isListening = false;

    // Asynchronous JSON Bootloader File Fetcher
    window.addEventListener('DOMContentLoaded', () => {
        initSpeechRecognition();
        
        // Warm up speech synthesis engine without breaking the main thread
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }
        
        fetch('./data/vocab_master.json')
            .then(response => {
                if (!response.ok) throw new Error("Database file missing or unreachable.");
                return response.json();
            })
            .then(data => {
                allWords = data; 
                applyFilters();
            })
            .catch(error => {
                console.error("Data fetch context mismatch exception:", error);
                document.getElementById("word-display").innerText = "Database Error";
                document.getElementById("type-display").innerText = "COULD NOT PARSE DATA/VOCAB_MASTER.JSON";
            });
    });

    // Filtering Normalization Mapping
    function applyFilters() {
    const selectedLevel = document.getElementById("level-filter").value.toLowerCase().trim();
    const selectedType = document.getElementById("type-filter").value.toLowerCase().trim();

    filteredPool = allWords.filter(word => {
        const targetLevel = (word.level || "").toString().toLowerCase().trim();
        const targetType = (word.pos || word.type || "").toString().toLowerCase().trim();

        // Smart level matching for grouped brackets (e.g., "a1-a2" or "c1-c2")
        let matchesLevel = false;
        if (selectedLevel === "all") {
            matchesLevel = true;
        } else if (selectedLevel === "a1" || selectedLevel === "a2") {
            // If user selects A1 or A2, match if the JSON contains "a1" or "a2"
            matchesLevel = targetLevel.includes("a1") || targetLevel.includes("a2");
        } else if (selectedLevel === "c1" || selectedLevel === "c2") {
            // If user selects C1 or C2, match if the JSON contains "c1" or "c2"
            matchesLevel = targetLevel.includes("c1") || targetLevel.includes("c2");
        } else {
            // Default exact matching for B1, B2, etc.
            matchesLevel = targetLevel.includes(selectedLevel);
        }

        // Match Part of Speech variations flexibly
        let matchesType = false;
        if (selectedType === "all") {
            matchesType = true;
        } else if (selectedType === "verb") {
            matchesType = targetType.includes("verb");
        } else if (selectedType === "noun") {
            matchesType = targetType.includes("noun") || targetType.includes("nom");
        } else if (selectedType === "adjective") {
            matchesType = targetType.includes("adj");
        }
        
        return matchesLevel && matchesType;
    });

    currentIndex = 0;
    updateCardUI();
}

    // Dynamic Engine Card Renderer
    function updateCardUI() {
        const poolCountDisplay = document.getElementById("pool-count");
        const rankDisplay = document.getElementById("rank-display");
        const levelBadge = document.getElementById("level-badge");
        const wordDisplay = document.getElementById("word-display");
        const typeDisplay = document.getElementById("type-display");
        const feedbackDisplay = document.getElementById("voice-feedback");
        
        document.getElementById("translation-display").classList.add("hidden");
        feedbackDisplay.innerText = "";
        feedbackDisplay.className = "voice-feedback";

        poolCountDisplay.innerText = filteredPool.length;

        // Graceful handling of 0 results layout matching
        if (filteredPool.length === 0) {
            const levelSelect = document.getElementById("level-filter");
            const typeSelect = document.getElementById("type-filter");

            wordDisplay.innerText = "Empty Pool";
            typeDisplay.innerText = typeSelect.options[typeSelect.selectedIndex].text.toUpperCase();
            rankDisplay.innerText = "RANK #----";
            levelBadge.innerText = levelSelect.value === "all" ? "A1-C2" : levelSelect.value.toUpperCase();
            return;
        }

        const activeWord = filteredPool[currentIndex];
        
        wordDisplay.innerText = activeWord.word || "Missing Word";
        typeDisplay.innerText = (activeWord.pos || activeWord.type || "UNKNOWN").toUpperCase();
        rankDisplay.innerText = `RANK #${activeWord.rank || "----"}`;
        
        // Clean up display strings for the badge layout safely
        const displayLevel = activeWord.level ? activeWord.level.toString().split(" ")[0] : "A1";
        levelBadge.innerText = displayLevel.toUpperCase();
    }

    // Enhanced Translation Revealer
    function revealTranslation() {
        if (filteredPool.length === 0) return;
        
        const activeWord = filteredPool[currentIndex];
        const transBox = document.getElementById("translation-display");
        
        document.getElementById("meaning-display").innerText = activeWord.english || activeWord.translation || "No definition found.";
        
        const frSentence = activeWord.sentence_fr || activeWord.example_fr || "";
        const enSentence = activeWord.sentence_en || activeWord.example_en || "";
        const sentenceBox = document.getElementById("sentence-box");

        if (frSentence || enSentence) {
            sentenceBox.classList.remove("hidden");
            document.getElementById("sentence-fr-display").innerHTML = `<strong>Ex:</strong> ${frSentence}`;
            document.getElementById("sentence-en-display").innerText = enSentence;
        } else {
            sentenceBox.classList.add("hidden");
        }
        
        transBox.classList.remove("hidden");
    }

    function nextWord() {
        if (filteredPool.length <= 1) return;
        currentIndex = (currentIndex + 1) % filteredPool.length;
        updateCardUI();
    }

    // Audio Output Playback Module with Asynchronous Speech Fix
    function playAudio() {
        if (filteredPool.length === 0) return;
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            
            const textToSpeak = filteredPool[currentIndex].word;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'fr-FR';

            // Safe lookup for voices loaded down the line
            const voices = window.speechSynthesis.getVoices();
            if (voices && voices.length > 0) {
                const nativeFrenchVoice = voices.find(v => v.lang.startsWith('fr'));
                if (nativeFrenchVoice) utterance.voice = nativeFrenchVoice;
            }

            window.speechSynthesis.speak(utterance);
        } else {
            alert("Audio speech synthesis components are not supported or blocked on this browser profile.");
        }
    }

    // High Accuracy Speech Evaluation Microphone Pipeline
    function initSpeechRecognition() {
        const SpeechClass = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechClass) {
            console.warn("Speech API layer inaccessible or unsupported in this engine.");
            document.getElementById("mic-btn").style.display = "none";
            return;
        }

        recognition = new SpeechClass();
        recognition.lang = 'fr-FR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isListening = true;
            document.getElementById("mic-btn").classList.add("active");
            document.getElementById("voice-feedback").innerText = "Listening... Pronounce the French word.";
        };

        recognition.onend = () => {
            isListening = false;
            document.getElementById("mic-btn").classList.remove("active");
        };

        recognition.onerror = (e) => {
            console.error(e);
            document.getElementById("voice-feedback").innerText = `Mic API Exception Context: ${e.error}`;
        };

        recognition.onresult = (event) => {
            const resultString = event.results[0][0].transcript.toLowerCase().trim().replace(/[\.,-\/#!$%\^&\*;:{}=\-_`~()]/g,"");
            const targetString = (filteredPool[currentIndex].word || "").toLowerCase().trim().replace(/[\.,-\/#!$%\^&\*;:{}=\-_`~()]/g,"");
            
            const feedbackElement = document.getElementById("voice-feedback");

            if (resultString === targetString) {
                feedbackElement.innerText = `Excellent! Matched: "${resultString}"`;
                feedbackElement.classList.add("voice-success");
            } else {
                feedbackElement.innerText = `Heard: "${resultString}". Try again!`;
                feedbackElement.classList.remove("voice-success");
            }
        };
    }

    function toggleVoiceCapture() {
        if (!recognition) {
            alert("Voice verification API requires modern browser layouts over secure connections.");
            return;
        }
        if (filteredPool.length === 0) return;

        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    }
</script>
</body>
</html>
