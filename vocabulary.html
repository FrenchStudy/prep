<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCF 5K Matrix Sprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-6 flex flex-col items-center">
    
    <!-- Unified Header Banner matching your existing theme -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-8 bg-blue-600 p-6 rounded-2xl text-white shadow-md shadow-blue-100">
        <div>
            <h1 class="text-xl font-bold">TCF 5,000 Frequency Suite</h1>
            <p class="text-xs text-blue-100">Active-recall filter matrix</p>
        </div>
        <a href="index.html" class="text-sm font-bold bg-white/20 px-4 py-2 rounded-xl hover:bg-white/30 transition">← Return Dashboard</a>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Filter Controls Sidebar -->
        <section class="bg-white p-6 rounded-2xl border border-slate-200 h-fit space-y-4 shadow-sm">
            <h2 class="font-bold text-slate-800 border-b pb-2">Target Filter Settings</h2>
            
            <!-- CEFR Selection Dropdown -->
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">CEFR Level</label>
                <select id="lvl-box" class="w-full bg-slate-50 border p-2.5 rounded-xl text-sm font-medium focus:outline-none focus:border-blue-500">
                    <option value="ALL">All Levels (A1-C2)</option>
                    <option value="A1">A1 (Beginner Essentials)</option>
                    <option value="A2">A2 (Elementary Core)</option>
                    <option value="B1">B1 (Intermediate Sprint)</option>
                    <option value="B2">B2 (Upper Intermediate)</option>
                    <option value="C1">C1 (Advanced Lexicon)</option>
                    <option value="C2">C2 (Fluency Mastery)</option>
                </select>
            </div>
            
            <!-- Part of Speech Selection Dropdown -->
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Part of Speech</label>
                <select id="pos-box" class="w-full bg-slate-50 border p-2.5 rounded-xl text-sm font-medium focus:outline-none focus:border-blue-500">
                    <option value="ALL">All Word Types</option>
                    <option value="Noun">Nouns Only</option>
                    <option value="Verb">Verbs Only</option>
                    <option value="Adjective">Adjectives Only</option>
                    <option value="Adverb">Adverbs Only</option>
                </select>
            </div>

            <div class="bg-slate-50 p-3 rounded-xl border border-dashed text-center">
                <span class="text-xs text-slate-400 block">Words in Active Filter Pool</span>
                <span id="match-count" class="text-xl font-bold text-blue-600">0</span>
            </div>
        </section>

        <!-- Active Flashcard Arena -->
        <section class="md:col-span-2 bg-white border p-8 rounded-2xl shadow-sm text-center flex flex-col justify-between min-h-[380px]">
            <div>
                <div class="flex justify-between items-center">
                    <span id="rk" class="text-xs font-mono font-bold text-slate-400">---</span>
                    <span id="tg" class="text-xs font-bold bg-blue-50 text-blue-600 px-2.5 py-1 rounded-md">---</span>
                </div>
                
                <h2 id="wd" class="text-4xl font-extrabold text-slate-800 mt-6 tracking-tight">---</h2>
                <p id="pos-sub" class="text-xs text-slate-400 italic font-medium mt-1">---</p>
                
                <p id="fr" class="mt-6 bg-slate-50 p-4 rounded-xl border-l-4 border-blue-500 text-left text-slate-700 font-medium text-lg leading-relaxed">---</p>
                
                <!-- Hidden Solution Drawer -->
                <div id="ans" class="hidden mt-4 border-t pt-4 text-left animate-fade-in">
                    <h3 id="en" class="text-2xl font-bold text-emerald-600 tracking-tight">---</h3>
                    <p id="eg" class="text-slate-500 italic text-sm mt-1 leading-relaxed">---</p>
                </div>
            </div>
            
            <!-- Interface Control Inputs -->
            <div class="flex gap-4 mt-6">
                <button id="rev" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl transition shadow-sm">Reveal Translation</button>
                <button id="nxt" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md shadow-blue-100">Next Word ➔</button>
            </div>
        </section>
    </main>

    <script>
        let db = [], pool = [], curr = null;
        
        async function run() {
            // Load the categorized data layer
            db = await (await fetch('data/vocab_master.json')).json();
            
            document.getElementById('lvl-box').onchange = filter;
            document.getElementById('pos-box').onchange = filter;
            document.getElementById('rev').onclick = () => document.getElementById('ans').classList.remove('hidden');
            document.getElementById('nxt').onclick = next;
            
            filter();
        }
        
        function filter() {
            let l = document.getElementById('lvl-box').value;
            let p = document.getElementById('pos-box').value;
            
            pool = db.filter(i => (l==='ALL' || i.level===l) && (p==='ALL' || i.pos===p));
            document.getElementById('match-count').innerText = pool.length.toLocaleString();
            next();
        }
        
        function next() {
            document.getElementById('ans').classList.add('hidden');
            if(!pool.length) { 
                document.getElementById('wd').innerText = "Empty Pool"; 
                document.getElementById('fr').innerText = "Change filters to find words matching this combination.";
                return; 
            }
            curr = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('rk').innerText = `RANK #${curr.rank}`;
            document.getElementById('tg').innerText = `Level ${curr.level} • ${curr.ipa || ''}`;
            document.getElementById('wd').innerText = curr.word;
            document.getElementById('pos-sub').innerText = curr.pos.toUpperCase();
            document.getElementById('fr').innerText = curr.sentence_fr;
            document.getElementById('en').innerText = curr.english;
            document.getElementById('eg').innerText = curr.sentence_en;
        }
        window.onload = run;
    </script>
</body>
</html>
