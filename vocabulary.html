<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TCF 5,000 Frequency Suite</title>
    <style>
        :root { --primary: #2563EB; --bg-main: #F1F5F9; }
        body { font-family: sans-serif; background: var(--bg-main); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .tile { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; text-align: center; }
        .tile:hover { border-color: var(--primary); }
        /* Modal for Grammar */
        #grammar-modal { display: none; position: fixed; top: 10%; left: 25%; width: 50%; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="controls">
    <select id="type-filter" onchange="filterAndRender()">
        <option value="all">All Categories</option>
        <option value="verb">Verbs</option>
        <option value="noun">Nouns</option>
    </select>
    <button onclick="recognition.start()">🎙️ Practice Pronunciation</button>
</div>

<div class="grid" id="word-grid"></div>

<!-- Grammar View -->
<div id="grammar-modal">
    <h2 id="modal-word"></h2>
    <div id="grammar-content"></div>
    <button onclick="document.getElementById('grammar-modal').style.display='none'">Close</button>
</div>

<script>
    let allWords = [];
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => { allWords = data; filterAndRender(); });

    function filterAndRender() {
        const type = document.getElementById("type-filter").value;
        const filtered = allWords.filter(w => type === "all" || (w["Part of Speech"] || "").toLowerCase().includes(type));
        const grid = document.getElementById("word-grid");
        grid.innerHTML = "";
        
        // Show first 20 words as tiles
        filtered.slice(0, 20).forEach(w => {
            const div = document.createElement("div");
            div.className = "tile";
            div.innerHTML = `<h3>${w.French}</h3><p>${w.English}</p>`;
            div.onclick = () => showGrammar(w);
            grid.appendChild(div);
        });
    }

    function showGrammar(w) {
        document.getElementById("modal-word").innerText = w.French;
        // Dynamically inject your grammar info here
        document.getElementById("grammar-content").innerHTML = `
            <p><strong>Part of Speech:</strong> ${w["Part of Speech"]}</p>
            <p><strong>Gender/Type:</strong> ${w["Noun Gender"] || w["Verb Type"] || "N/A"}</p>
            <p><strong>Sentence:</strong> ${w.SentenceFR || "No example"}</p>
        `;
        document.getElementById("grammar-modal").style.display = "block";
    }

    // Fixed Speech Logic
    recognition.onresult = (e) => {
        const target = "parler"; // Replace with logic to grab from clicked tile
        const heard = e.results[0][0].transcript.toLowerCase();
        alert(heard === target ? "✅ Perfect!" : `❌ You said: ${heard}`);
    };
</script>
</body>
</html>
