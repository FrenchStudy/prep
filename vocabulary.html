<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TCF Frequency Suite - Diagnostic Mode</title>
    <style>
        .hidden { display: none !important; }
        .card { border: 1px solid #ccc; padding: 20px; margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <select id="level-filter" onchange="applyFilters()">
            <option value="all">All Levels</option>
            <option value="a1">A1</option>
            <option value="b1">B1</option>
        </select>
        <div id="pool-count">Count: 0</div>
    </div>

    <div class="card">
        <h1 id="word-display">Waiting for Data...</h1>
        <button onclick="reveal()">Reveal</button>
        <div id="reveal-area" class="hidden">
            <p id="meaning"></p>
        </div>
    </div>

<script>
    let allWords = [];
    
    // 1. Data Loading with diagnostic
    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => {
            allWords = data;
            // DIAGNOSTIC: This prints the structure to your F12 Console
            console.log("JSON Keys found:", Object.keys(allWords[0]));
            applyFilters();
        });

    function applyFilters() {
        const lVal = document.getElementById("level-filter").value.toLowerCase();
        
        // 2. Flexible Filter: Look at the console keys, then update these keys
        filteredPool = allWords.filter(w => {
            // Change these keys to match exactly what your console prints
            const levelField = w.Level || w.level || w.CEFR || ""; 
            return lVal === "all" || levelField.toLowerCase().includes(lVal);
        });

        document.getElementById("pool-count").innerText = "Count: " + filteredPool.length;
        render(filteredPool[0]);
    }

    function render(w) {
        if(!w) return;
        document.getElementById("word-display").innerText = w.French;
        document.getElementById("meaning").innerText = w.English;
    }

    function reveal() { document.getElementById("reveal-area").classList.remove("hidden"); }
</script>
</body>
</html>
