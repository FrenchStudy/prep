<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TCF Frequency Suite</title>
    <style>
        body { font-family: sans-serif; background: #F1F5F9; padding: 20px; }
        .workspace { display: grid; grid-template-columns: 280px 1fr; gap: 20px; max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; border: 1px solid #E2E8F0; text-align: center; }
        .btn { padding: 10px 15px; cursor: pointer; margin: 5px; border-radius: 8px; border: 1px solid #ccc; background: white; }
        #word-display { font-size: 3em; margin: 20px 0; color: #2563EB; }
        .hidden { display: none !important; }
        
        /* Grammar Table Styling */
        .grammar-panel { margin-top: 15px; background: #F8FAFC; border: 1px solid #CBD5E1; border-radius: 8px; padding: 15px; text-align: left; }
        .conj-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .conj-table td { padding: 6px; border-bottom: 1px solid #E2E8F0; }
        .mood-select { padding: 5px; border-radius: 4px; border: 1px solid #CBD5E1; font-weight: bold; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="card">
        <h2>Filters</h2>
        <label>Difficulty</label>
        <select id="level-filter" onchange="applyFilters()">
            <option value="all">All Levels</option>
            <option value="basic">Basic</option>
            <option value="medium">Medium</option>
            <option value="advanced">Advanced</option>
        </select>
        
        <label style="display:block; margin-top:15px;">Part of Speech</label>
        <select id="type-filter" onchange="applyFilters()">
            <option value="all">All Types</option>
            <option value="verb">Verb</option>
            <option value="noun">Noun</option>
        </select>
        <div id="pool-count" style="margin-top:15px; font-weight:bold;">Count: 0</div>
    </div>

    <div class="card">
        <h1 id="word-display">Loading...</h1>
        <div id="feedback-area" style="height:30px; font-weight:bold;"></div>
        <button class="btn" onclick="playAudio()">🔊 Listen</button>
        <button class="btn" onclick="startVoice()">🎙️ Practice</button>
        
        <!-- REVEAL AREA -->
        <div id="reveal-area" class="hidden" style="margin-top:20px;">
            <div id="meaning-display" style="font-size: 1.5em; font-weight: bold; margin-bottom: 15px;"></div>
            
            <!-- NEW: INTERACTIVE GRAMMAR ENGINE -->
            <div id="grammar-interactive" class="grammar-panel hidden">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong style="color: #334155;">Conjugation Engine</strong>
                    <select id="mood-selector" class="mood-select" onchange="updateConjugationTable()">
                        <option value="present">Indicative (Present)</option>
                        <option value="imperfect">Indicative (Imperfect)</option>
                        <option value="conditional">Conditional (Present)</option>
                        <option value="subjunctive">Subjunctive (Present)</option>
                        <option value="imperative">Imperative</option>
                    </select>
                </div>
                <div id="conjugation-table"></div>
            </div>
        </div>
        
        <div style="margin-top:20px;">
            <button class="btn" onclick="prevWord()">← Prev</button>
            <button class="btn" style="background:#2563EB; color:white; font-weight:bold;" onclick="reveal()">Reveal</button>
            <button class="btn" onclick="nextWord()">Next →</button>
        </div>
    </div>
</div>

<script>
    let allWords = [], filteredPool = [], currentIndex = 0;
    let currentVerbForEngine = "";
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => { allWords = data; applyFilters(); });

    function applyFilters() {
        const lVal = document.getElementById("level-filter").value.toLowerCase();
        const tVal = document.getElementById("type-filter").value.toLowerCase();

        filteredPool = allWords.filter(w => {
            const pos = (w["Part of Speech"] || w.pos || "").toLowerCase();
            const matchesType = (tVal === "all" || pos.includes(tVal));

            const freq = w.Freq || 0;
            let matchesFreq = true;
            if (lVal === "basic") matchesFreq = freq >= 10000;
            else if (lVal === "medium") matchesFreq = freq >= 1000 && freq < 10000;
            else if (lVal === "advanced") matchesFreq = freq > 0 && freq < 1000;
            
            return matchesType && matchesFreq;
        });

        currentIndex = 0;
        updateCardUI();
    }

    function updateCardUI() {
        document.getElementById("pool-count").innerText = "Count: " + filteredPool.length;
        const w = filteredPool[currentIndex];
        document.getElementById("word-display").innerText = w ? (w.French || w.word) : "No results";
        document.getElementById("reveal-area").classList.add("hidden");
    }

    function reveal() {
        if (filteredPool.length === 0) return;
        const w = filteredPool[currentIndex];
        
        document.getElementById("meaning-display").innerText = w.English || "---";
        const pos = (w["Part of Speech"] || w.pos || "").toLowerCase();
        
        // Trigger grammar engine if word is a verb
        if (pos.includes("verb")) {
            currentVerbForEngine = (w.French || w.word).toLowerCase().trim();
            document.getElementById("grammar-interactive").classList.remove("hidden");
            // Reset dropdown to present tense and build table
            document.getElementById("mood-selector").value = "present";
            updateConjugationTable();
        } else {
            document.getElementById("grammar-interactive").classList.add("hidden");
        }
        
        document.getElementById("reveal-area").classList.remove("hidden");
    }

    // --- CONJUGATION ENGINE ---
    function updateConjugationTable() {
        const mood = document.getElementById("mood-selector").value;
        const tableDiv = document.getElementById("conjugation-table");
        let verb = currentVerbForEngine;

        // 1. Handle Special Irregular Cases (avoir, être)
        const irregularData = getIrregularData(verb, mood);
        if (irregularData) {
            tableDiv.innerHTML = generateTableHTML(irregularData.p, irregularData.f);
            return;
        }

        // 2. Determine verb group (er, ir, re)
        let type = "", stem = "";
        if (verb.endsWith("er")) { type = "er"; stem = verb.slice(0, -2); }
        else if (verb.endsWith("ir")) { type = "ir"; stem = verb.slice(0, -2); }
        else if (verb.endsWith("re")) { type = "re"; stem = verb.slice(0, -2); }
        else {
            tableDiv.innerHTML = "<p style='margin-top:10px; color:#ef4444;'>Irregular or unsupported verb ending.</p>";
            return;
        }

        // 3. Apply grammar chart rules
        let endings = [];
        let pronouns = ["je", "tu", "il/elle", "nous", "vous", "ils/elles"];

        if (mood === "present") {
            if (type === "er") endings = ["e", "es", "e", "ons", "ez", "ent"];
            if (type === "ir") endings = ["is", "is", "it", "issons", "issez", "issent"];
            if (type === "re") endings = ["s", "s", "", "ons", "ez", "ent"];
        } else if (mood === "imperfect") {
            let impStem = type === "ir" ? stem + "iss" : stem;
            endings = ["ais", "ais", "ait", "ions", "iez", "aient"];
            stem = impStem;
        } else if (mood === "conditional") {
            stem = verb; 
            if (type === "re") stem = verb.slice(0, -1); // drop 'e' for re verbs
            endings = ["ais", "ais", "ait", "ions", "iez", "aient"];
        } else if (mood === "subjunctive") {
            let subjStem = type === "ir" ? stem + "iss" : stem;
            pronouns = ["que je", "que tu", "qu'il/elle", "que nous", "que vous", "qu'ils/elles"];
            endings = ["e", "es", "e", "ions", "iez", "ent"];
            stem = subjStem;
        } else if (mood === "imperative") {
            if (type === "er") return tableDiv.innerHTML = generateTableHTML(["tu", "nous", "vous"], [`${stem}e`, `${stem}ons`, `${stem}ez`]);
            if (type === "ir") return tableDiv.innerHTML = generateTableHTML(["tu", "nous", "vous"], [`${stem}is`, `${stem}issons`, `${stem}issez`]);
            if (type === "re") return tableDiv.innerHTML = generateTableHTML(["tu", "nous", "vous"], [`${stem}s`, `${stem}ons`, `${stem}ez`]);
        }

        // Format 'je' to "j'" for vowels
        const firstLetter = (endings[0] ? stem + endings[0] : stem).charAt(0);
        if ("aeiouhâêîôûéè".includes(firstLetter)) {
            if (pronouns[0] === "je") pronouns[0] = "j'";
            if (pronouns[0] === "que je") pronouns[0] = "que j'";
        }

        let forms = endings.map(e => stem + e);
        tableDiv.innerHTML = generateTableHTML(pronouns, forms);
    }

    function getIrregularData(verb, mood) {
        const stdPronouns = ["je", "tu", "il/elle", "nous", "vous", "ils/elles"];
        if (verb === "avoir") {
            if (mood === "present") return { p: ["j'", "tu", "il/elle", "nous", "vous", "ils/elles"], f: ["ai", "as", "a", "avons", "avez", "ont"] };
            if (mood === "imperfect") return { p: ["j'", "tu", "il/elle", "nous", "vous", "ils/elles"], f: ["avais", "avais", "avait", "avions", "aviez", "avaient"] };
            if (mood === "conditional") return { p: ["j'", "tu", "il/elle", "nous", "vous", "ils/elles"], f: ["aurais", "aurais", "aurait", "aurions", "auriez", "auraient"] };
            if (mood === "subjunctive") return { p: ["que j'", "que tu", "qu'il", "que nous", "que vous", "qu'ils"], f: ["aie", "aies", "ait", "ayons", "ayez", "aient"] };
            if (mood === "imperative") return { p: ["tu", "nous", "vous"], f: ["aie", "ayons", "ayez"] };
        }
        if (verb === "être" || verb === "etre") {
            if (mood === "present") return { p: stdPronouns, f: ["suis", "es", "est", "sommes", "êtes", "sont"] };
            if (mood === "imperfect") return { p: ["j'", "tu", "il/elle", "nous", "vous", "ils/elles"], f: ["étais", "étais", "était", "étions", "étiez", "étaient"] };
            if (mood === "conditional") return { p: stdPronouns, f: ["serais", "serais", "serait", "serions", "seriez", "seraient"] };
            if (mood === "subjunctive") return { p: ["que je", "que tu", "qu'il", "que nous", "que vous", "qu'ils"], f: ["sois", "sois", "soit", "soyons", "soyez", "soient"] };
            if (mood === "imperative") return { p: ["tu", "nous", "vous"], f: ["sois", "soyons", "soyez"] };
        }
        return null; // Not a targeted irregular verb
    }

    function generateTableHTML(pronouns, forms) {
        let html = `<table class="conj-table">`;
        for (let i = 0; i < pronouns.length; i += 2) {
            let p1 = pronouns[i] ? `<strong>${pronouns[i]}</strong>` : "";
            let p2 = pronouns[i+1] ? `<strong>${pronouns[i+1]}</strong>` : "";
            html += `<tr>
                <td style="width:50%">${p1} <span style="color:#2563EB">${forms[i] || ""}</span></td>
                <td style="width:50%">${p2} <span style="color:#2563EB">${forms[i+1] || ""}</span></td>
            </tr>`;
        }
        html += `</table>`;
        return html;
    }

    // --- NAVIGATION AND AUDIO ---
    function nextWord() {
        if (filteredPool.length === 0) return;
        currentIndex = (currentIndex + 1) % filteredPool.length;
        updateCardUI();
    }

    function prevWord() {
        if (filteredPool.length === 0) return;
        currentIndex = (currentIndex - 1 + filteredPool.length) % filteredPool.length;
        updateCardUI();
    }

    function playAudio() {
        if (!filteredPool[currentIndex]) return;
        const msg = new SpeechSynthesisUtterance(filteredPool[currentIndex].French || filteredPool[currentIndex].word);
        msg.lang = 'fr-FR';
        window.speechSynthesis.speak(msg);
    }

    function startVoice() {
        if (!filteredPool[currentIndex]) return;
        recognition.lang = 'fr-FR';
        recognition.start();
        recognition.onresult = (e) => {
            const heard = e.results[0][0].transcript.toLowerCase().trim();
            const target = (filteredPool[currentIndex].French || filteredPool[currentIndex].word).toLowerCase().trim();
            document.getElementById("feedback-area").innerText = (heard === target) ? "✅ Correct!" : "❌ You said: " + heard;
        };
    }
</script>
</body>
</html>
