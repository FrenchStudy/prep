<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TCF 5,000 Frequency Suite</title>
    <style>
        :root { --primary: #2563EB; --success: #059669; --bg-main: #F1F5F9; --card-bg: #FFFFFF; --text-main: #1E293B; --border-color: #E2E8F0; }
        body { background-color: var(--bg-main); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .workspace { display: grid; grid-template-columns: 260px 1fr; gap: 20px; width: 100%; max-width: 900px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); text-align: center; }
        .word-img { max-width: 200px; border-radius: 10px; margin-bottom: 10px; }
        .btn { padding: 10px 15px; border-radius: 8px; cursor: pointer; border: none; margin: 5px; }
        .btn-primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="card">
        <h2>Filters</h2>
        <select id="level-filter" onchange="applyFilters()">
            <option value="all">All Levels</option>
            <option value="a1">A1/A2</option>
            <option value="b1">B1</option>
        </select>
        <select id="type-filter" onchange="applyFilters()">
            <option value="all">All Types</option>
            <option value="verb">Verbs</option>
            <option value="noun">Nouns</option>
        </select>
        <div id="pool-count">0</div>
    </div>

    <div class="card">
        <img id="word-image" class="word-img" src="" alt="">
        <h1 id="word-display">Loading...</h1>
        <div id="extra-info" style="font-weight:bold; color:var(--primary);"></div>
        
        <div id="controls">
            <button onclick="playAudio()">🔊</button>
            <button onclick="toggleVoiceCapture()">🎙️</button>
        </div>

        <div id="translation-box" class="hidden">
            <h2 id="meaning-display"></h2>
            <p id="sentence-fr-display"></p>
        </div>

        <button class="btn" onclick="prevWord()">← Prev</button>
        <button class="btn btn-primary" onclick="revealTranslation()">Reveal</button>
        <button class="btn" onclick="nextWord()">Next →</button>
    </div>
</div>

<script>
    let allWords = [], filteredPool = [], currentIndex = 0;

    // Use the correct path to your JSON
    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => { allWords = data; applyFilters(); });

    function applyFilters() {
        const type = document.getElementById("type-filter").value;
        filteredPool = allWords.filter(w => type === "all" || (w["Part of Speech"] || "").toLowerCase().includes(type));
        currentIndex = 0;
        updateCardUI();
    }

    function updateCardUI() {
        const w = filteredPool[currentIndex];
        if (!w) return;
        document.getElementById("word-display").innerText = w.French;
        document.getElementById("pool-count").innerText = filteredPool.length;
        
        // Show Noun/Verb specific data
        let extra = "";
        if (w["Noun Gender"]) extra += `Gender: ${w["Noun Gender"]} `;
        if (w["Verb Type"]) extra += `| Type: ${w["Verb Type"]}`;
        document.getElementById("extra-info").innerText = extra;
        
        document.getElementById("translation-box").classList.add("hidden");
        fetchImage(w.French);
    }

    function fetchImage(word) {
        fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`)
            .then(res => res.json())
            .then(data => {
                const img = document.getElementById("word-image");
                if (data.thumbnail) { img.src = data.thumbnail.source; img.classList.remove("hidden"); }
                else img.classList.add("hidden");
            });
    }

    function revealTranslation() {
        const w = filteredPool[currentIndex];
        document.getElementById("meaning-display").innerText = w.English;
        document.getElementById("sentence-fr-display").innerText = w.SentenceFR;
        document.getElementById("translation-box").classList.remove("hidden");
    }

    function nextWord() { currentIndex = (currentIndex + 1) % filteredPool.length; updateCardUI(); }
    function prevWord() { currentIndex = (currentIndex - 1 + filteredPool.length) % filteredPool.length; updateCardUI(); }

    function playAudio() {
        const msg = new SpeechSynthesisUtterance(filteredPool[currentIndex].French);
        msg.lang = 'fr-FR';
        window.speechSynthesis.speak(msg);
    }

    function toggleVoiceCapture() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.start();
        recognition.onresult = (e) => {
            if(e.results[0][0].transcript.toLowerCase() === filteredPool[currentIndex].French.toLowerCase()) {
                alert("Correct!");
            }
        };
    }
</script>
</body>
</html>
