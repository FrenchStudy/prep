<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TCF 5,000 Frequency Suite</title>
    <style>
        :root { --primary: #2563EB; --bg-main: #F1F5F9; }
        body { font-family: sans-serif; background: var(--bg-main); padding: 20px; }
        .workspace { display: grid; grid-template-columns: 260px 1fr; gap: 20px; max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; border: 1px solid #E2E8F0; text-align: center; }
        .hidden { display: none !important; }
        .btn { padding: 10px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="card">
        <h2>Filters</h2>
        <select id="level-filter" onchange="applyFilters()">
            <option value="all">All Levels</option>
            <option value="a1">A1</option>
            <option value="b1">B1</option>
            <option value="c1">C1</option>
        </select>
        <select id="type-filter" onchange="applyFilters()">
            <option value="all">All Categories</option>
            <option value="verb">Verb</option>
            <option value="noun">Noun</option>
        </select>
        <div id="pool-count" style="margin-top:10px; font-weight:bold;">Count: 0</div>
    </div>

    <div class="card">
        <h1 id="word-display">Loading...</h1>
        <button class="btn" onclick="playAudio()">🔊 Listen</button>
        <button class="btn" onclick="startVoice()">🎙️ Practice</button>
        
        <div id="reveal-area" class="hidden" style="margin-top:20px;">
            <h2 id="meaning-display"></h2>
        </div>

        <div style="margin-top:20px;">
            <button class="btn" onclick="prevWord()">← Prev</button>
            <button class="btn" onclick="reveal()">Reveal</button>
            <button class="btn" onclick="nextWord()">Next →</button>
        </div>
    </div>
</div>

<script>
    let allWords = [], filteredPool = [], currentIndex = 0;
    
    // Initialize SpeechRecognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => { 
            allWords = data; 
            applyFilters(); 
        });

    function applyFilters() {
        const lVal = document.getElementById("level-filter").value.toLowerCase();
        const tVal = document.getElementById("type-filter").value.toLowerCase();

        filteredPool = allWords.filter(w => {
            const str = JSON.stringify(w).toLowerCase();
            return (lVal === "all" || str.includes(lVal)) && 
                   (tVal === "all" || str.includes(tVal));
        });

        currentIndex = 0;
        updateCardUI();
    }

    function updateCardUI() {
        document.getElementById("pool-count").innerText = "Count: " + filteredPool.length;
        const wordEl = document.getElementById("word-display");
        
        if (filteredPool.length > 0) {
            wordEl.innerText = filteredPool[currentIndex].French || "---";
        } else {
            wordEl.innerText = "No matches found.";
        }
        document.getElementById("reveal-area").classList.add("hidden");
    }

    function reveal() {
        if (filteredPool.length > 0) {
            document.getElementById("meaning-display").innerText = filteredPool[currentIndex].English || "No definition.";
            document.getElementById("reveal-area").classList.remove("hidden");
        }
    }

    function nextWord() {
        if (filteredPool.length === 0) return;
        currentIndex = (currentIndex + 1) % filteredPool.length;
        updateCardUI();
    }

    function prevWord() {
        if (filteredPool.length === 0) return;
        // The formula below ensures we wrap around correctly from 0 to the last index
        currentIndex = (currentIndex - 1 + filteredPool.length) % filteredPool.length;
        updateCardUI();
    }

    function playAudio() {
        if (filteredPool.length > 0) {
            const msg = new SpeechSynthesisUtterance(filteredPool[currentIndex].French);
            msg.lang = 'fr-FR';
            window.speechSynthesis.speak(msg);
        }
    }

    function startVoice() {
        if (!recognition || filteredPool.length === 0) return;
        
        recognition.lang = 'fr-FR';
        recognition.start();
        
        recognition.onresult = (e) => {
            const heard = e.results[0][0].transcript.toLowerCase().trim();
            const target = filteredPool[currentIndex].French.toLowerCase().trim();
            
            if (heard === target) {
                alert("✅ Correct!");
            } else {
                alert("❌ You said: " + heard + ". Try again.");
            }
        };
    }
</script>
</body>
</html>
