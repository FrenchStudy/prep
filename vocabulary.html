<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TCF Frequency Suite - Diagnostic Mode</title>
    <style>
        .hidden { display: none !important; }
        .card { border: 1px solid #ccc; padding: 20px; margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <select id="level-filter" onchange="applyFilters()">
            <option value="all">All Levels</option>
            <option value="a1">A1</option>
            <option value="b1">B1</option>
        </select>
        <div id="pool-count">Count: 0</div>
    </div>

    <div class="card">
        <h1 id="word-display">Waiting for Data...</h1>
        <button onclick="reveal()">Reveal</button>
        <div id="reveal-area" class="hidden">
            <p id="meaning"></p>
        </div>
    </div>

<script>
    let allWords = [], filteredPool = [], currentIndex = 0;

    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => { 
            allWords = data; 
            // CRITICAL DEBUG: This shows you the ACTUAL keys in your JSON
            console.log("Sample Entry:", allWords[0]);
            applyFilters(); 
        });

    function applyFilters() {
        const lVal = document.getElementById("level-filter").value.toLowerCase();
        const tVal = document.getElementById("type-filter").value.toLowerCase();

        filteredPool = allWords.filter(w => {
            // We search for keys dynamically. 
            // If the key is 'Rank' or 'French', look for them here!
            const levelStr = JSON.stringify(w).toLowerCase();
            return (lVal === "all" || levelStr.includes(lVal)) && 
                   (tVal === "all" || levelStr.includes(tVal));
        });

        currentIndex = 0;
        updateCardUI();
    }

    function updateCardUI() {
        document.getElementById("pool-count").innerText = filteredPool.length;
        
        // SAFETY: Only update if we have words
        if (filteredPool.length === 0) {
            document.getElementById("word-display").innerText = "No matches found";
            return;
        }

        const w = filteredPool[currentIndex];
        document.getElementById("word-display").innerText = w.French || "N/A";
    }

    function playAudio() {
        if (!filteredPool[currentIndex]) {
            alert("No word selected!");
            return;
        }
        const msg = new SpeechSynthesisUtterance(filteredPool[currentIndex].French);
        msg.lang = 'fr-FR';
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
