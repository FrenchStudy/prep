<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TCF Frequency Suite</title>
    <style>
        body { font-family: sans-serif; background: #F1F5F9; padding: 20px; }
        .workspace { display: grid; grid-template-columns: 280px 1fr; gap: 20px; max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; border: 1px solid #E2E8F0; text-align: center; }
        .btn { padding: 10px 15px; cursor: pointer; margin: 5px; border-radius: 8px; border: 1px solid #ccc; background: white; }
        #word-display { font-size: 3em; margin: 20px 0; color: #2563EB; }
        .hidden { display: none !important; }
        .grammar-panel { margin-top: 15px; background: #F8FAFC; border: 1px solid #CBD5E1; border-radius: 8px; padding: 15px; text-align: left; }
        .conj-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .conj-table td { padding: 6px; border-bottom: 1px solid #E2E8F0; }
        .mood-select { padding: 5px; border-radius: 4px; border: 1px solid #CBD5E1; font-weight: bold; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="card">
        <h2>Filters</h2>
        <label>Difficulty</label>
        <select id="level-filter" onchange="applyFilters()">
            <option value="all">All Levels</option>
            <option value="basic">Basic</option>
            <option value="medium">Medium</option>
            <option value="advanced">Advanced</option>
        </select>
        
        <label style="display:block; margin-top:15px;">Part of Speech</label>
        <select id="type-filter" onchange="applyFilters()">
            <option value="all">All Types</option>
            <option value="verb">Verb</option>
            <option value="noun">Noun</option>
            <option value="prep">Preposition</option>
        </select>
        <div id="pool-count" style="margin-top:15px; font-weight:bold;">Count: 0</div>
    </div>

    <div class="card">
        <h1 id="word-display">Loading...</h1>
        <div id="feedback-area" style="height:30px; font-weight:bold;"></div>
        <button class="btn" onclick="playAudio()">🔊 Listen</button>
        <button class="btn" onclick="startVoice()">🎙️ Practice</button>
        
        <div id="reveal-area" class="hidden" style="margin-top:20px;">
            <div id="meaning-display" style="font-size: 1.5em; font-weight: bold; margin-bottom: 15px;"></div>
            
            <!-- Grammar & Article Panel -->
            <div id="grammar-interactive" class="grammar-panel hidden">
                <div id="mood-selector-container">
                    <select id="mood-selector" class="mood-select" onchange="updateConjugationTable()">
                        <option value="present">Indicative (Present)</option>
                        <option value="imperfect">Indicative (Imperfect)</option>
                        <option value="conditional">Conditional (Present)</option>
                        <option value="subjunctive">Subjunctive (Present)</option>
                        <option value="imperative">Imperative</option>
                    </select>
                </div>
                <div id="conjugation-table"></div>
            </div>
            <div id="article-box" class="grammar-panel hidden"></div>
        </div>
        
        <div style="margin-top:20px;">
            <button class="btn" onclick="prevWord()">← Prev</button>
            <button class="btn" style="background:#2563EB; color:white; font-weight:bold;" onclick="reveal()">Reveal</button>
            <button class="btn" onclick="nextWord()">Next →</button>
        </div>
    </div>
</div>

<script>
    let allWords = [], filteredPool = [], currentIndex = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    fetch('./data/vocab_master.json')
        .then(res => res.json())
        .then(data => { allWords = data; applyFilters(); });

    function applyFilters() {
        const lVal = document.getElementById("level-filter").value.toLowerCase();
        const tVal = document.getElementById("type-filter").value.toLowerCase();

        filteredPool = allWords.filter(w => {
            const pos = (w["Part of Speech"] || w.pos || "").toLowerCase();
            const matchesType = (tVal === "all" || pos.includes(tVal));

            const freq = w.Freq || 0;
            let matchesFreq = true;
            if (lVal === "basic") matchesFreq = freq >= 10000;
            else if (lVal === "medium") matchesFreq = freq >= 1000 && freq < 10000;
            else if (lVal === "advanced") matchesFreq = freq > 0 && freq < 1000;
            
            return matchesType && matchesFreq;
        });

        currentIndex = 0;
        updateCardUI();
    }

    function updateCardUI() {
        document.getElementById("pool-count").innerText = "Count: " + filteredPool.length;
        const w = filteredPool[currentIndex];
        document.getElementById("word-display").innerText = w ? (w.French || w.word) : "No results";
        document.getElementById("reveal-area").classList.add("hidden");
    }

    function reveal() {
        if (filteredPool.length === 0) return;
        const w = filteredPool[currentIndex];
        document.getElementById("meaning-display").innerText = w.English || "---";
        
        const pos = (w["Part of Speech"] || w.pos || "").toLowerCase();
        const gender = (w["Noun Gender"] || "").toLowerCase();
        
        // Verb Logic
        if (pos.includes("verb")) {
            currentVerb = (w.French || w.word).toLowerCase().trim();
            document.getElementById("grammar-interactive").classList.remove("hidden");
            updateConjugationTable();
        } else { document.getElementById("grammar-interactive").classList.add("hidden"); }

        // Article Logic
        if (pos.includes("noun") && gender) {
            document.getElementById("article-box").classList.remove("hidden");
            document.getElementById("article-box").innerHTML = `<strong>Article Trainer:</strong><br> Gender: ${gender}<br> Use: ${gender.includes('masc') ? 'le / un / du' : 'la / une / de la'}`;
        } else { document.getElementById("article-box").classList.add("hidden"); }
        
        document.getElementById("reveal-area").classList.remove("hidden");
    }

    function updateConjugationTable() { /* [Keep the same logic as previous response for updateConjugationTable and getIrregularData] */ }

    // Navigation and Voice functions [Keep same as before]
</script>
</body>
</html>
