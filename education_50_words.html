<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCF 50 Words • Éducation & Formation</title>
    <style>
        :root {
            --primary: #059669;
            --dark-green: #047857;
            --dark: #0F172A;
            --light: #F8FAFC;
            --green: #10B981;
            --accent: #EF4135;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #E2E8F0; color: var(--dark); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: white; max-width: 900px; width: 100%; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); padding: 25px; border-top: 8px solid var(--primary); }
        .header { background: linear-gradient(135deg, var(--dark-green) 0%, var(--primary) 100%); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.8rem; margin-bottom: 4px; }
        .coaches-banner { display: flex; gap: 15px; background: #ECFDF5; border-left: 5px solid var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 25px; align-items: center; }
        .deck-header { color: var(--dark-green); font-size: 1.3rem; margin: 30px 0 15px 0; border-bottom: 2px solid #CBD5E1; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .vocab-card-interactive { background: var(--light); border: 2px solid #CBD5E1; border-radius: 16px; padding: 18px; margin-bottom: 16px; transition: all 0.2s ease; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .word-fr { font-weight: bold; color: var(--dark-green); font-size: 1.25rem; }
        .word-phonetic { font-size: 0.85rem; color: #059669; margin-top: 2px; }
        .word-en { font-size: 0.95rem; color: #64748B; margin-top: 2px; }
        .speaker-btn { font-size: 1.3rem; background: #E2E8F0; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .speaker-btn:hover { background: #CBD5E1; }
        .example-box { background: white; border-left: 4px solid var(--primary); padding: 10px 14px; border-radius: 6px; margin: 10px 0; font-size: 0.95rem; }
        .example-fr { font-weight: 600; color: var(--dark); }
        .example-en { font-size: 0.85rem; color: #64748B; margin-top: 2px; }
        .mic-section { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
        .btn-mic { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .btn-mic.recording { background: var(--accent); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .feedback-container { margin-top: 12px; background: #ECFDF5; border: 1px solid var(--green); padding: 12px; border-radius: 8px; display: none; font-size: 0.9rem; }
        .coach-tag { font-weight: bold; color: #065F46; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🎓 TCF Canada • 50 Interactive Education Words</h1>
        <p>Éducation, Apprentissage & Formation Continue</p>
    </div>

    <div class="coaches-banner">
        <span style="font-size: 2rem;">👨‍💼👩‍💻👩‍⚖️</span>
        <div>
            <strong>Interactive Voice Coaching:</strong><br>
            <span style="color: #475569; font-size: 0.9rem;">
                Click 🔊 to hear <strong>Marc</strong> read the example sentence. Click 🎙️ to practice speaking—<strong>Élodie</strong> transcribes your voice and <strong>Léa speaks back with live feedback!</strong>
            </span>
        </div>
    </div>

    <div id="vocab-container"></div>
</div>

<script>
    const vocabData = [
        // DECK 1: Academic Systems & Schooling
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 1, fr: "Le système éducatif", phon: "luh sees-tehm ay-doo-kah-teef", en: "Educational system", exFr: "Le système éducatif cherche à réduire les inégalités.", exEn: "The educational system seeks to reduce inequalities.", target: "système" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 2, fr: "L'enseignement supérieur", phon: "lahn-sayn-yuh-mahn", en: "Higher education", exFr: "L'enseignement supérieur attire de nombreux étudiants étrangers.", exEn: "Higher education attracts many international students.", target: "enseignement" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 3, fr: "Le parcours scolaire", phon: "luh par-koor skoh-lair", en: "Academic journey", exFr: "Son parcours scolaire témoigne d'une grande rigueur.", exEn: "Her academic journey reflects great rigor.", target: "parcours" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 4, fr: "La réussite académique", phon: "lah ray-oo-seet", en: "Academic success", exFr: "La réussite académique dépend du travail régulier.", exEn: "Academic success depends on consistent work.", target: "réussite" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 5, fr: "L'échec scolaire", phon: "lay-shehk skoh-lair", en: "Academic failure / Dropout", exFr: "Prévenir l'échec scolaire est une priorité nationale.", exEn: "Preventing school dropout is a national priority.", target: "échec" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 6, fr: "Le programme scolaire", phon: "luh proh-grahm", en: "School curriculum", exFr: "Le programme scolaire intègre désormais le codage.", exEn: "The school curriculum now integrates coding.", target: "programme" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 7, fr: "L'égalité des chances", phon: "lay-gah-lee-tay day shahnss", en: "Equal opportunity", exFr: "L'école publique doit garantir l'égalité des chances.", exEn: "Public school must guarantee equal opportunity.", target: "égalité" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 8, fr: "Les frais de scolarité", phon: "lay fray duh skoh-lah-ree-tay", en: "Tuition fees", exFr: "Les frais de scolarité sont modérés dans ce pays.", exEn: "Tuition fees are moderate in this country.", target: "frais" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 9, fr: "Une bourse d'études", phon: "ewn boor-ss day-tood", en: "Scholarship / Grant", exFr: "Elle a obtenu une bourse d'études pour l'université.", exEn: "She obtained a scholarship for university.", target: "bourse" },
        { deck: 1, deckTitle: "Deck 1 • Academic Systems & Schooling", id: 10, fr: "Le diplôme d'État", phon: "luh dee-plohm day-tah", en: "State degree", exFr: "Ce diplôme d'État est reconnu au niveau international.", exEn: "This state degree is recognized internationally.", target: "diplôme" },

        // DECK 2: E-Learning & Digital Literacy
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 11, fr: "L'enseignement à distance", phon: "lahn-sayn-yuh-mahn ah deess-tahnss", en: "Distance learning", exFr: "L'enseignement à distance offre une grande souplesse.", exEn: "Distance learning offers great flexibility.", target: "distance" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 12, fr: "La littératie numérique", phon: "lah lee-tay-rah-see", en: "Digital literacy", exFr: "La littératie numérique est essentielle pour les métiers de demain.", exEn: "Digital literacy is essential for tomorrow's jobs.", target: "littératie" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 13, fr: "Une classe virtuelle", phon: "ewn klahss veer-too-el", en: "Virtual classroom", exFr: "Les élèves se connectent à leur classe virtuelle chaque matin.", exEn: "Students log into their virtual classroom every morning.", target: "virtuelle" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 14, fr: "Les outils pédagogiques", phon: "lay zoo-tee pay-dah-goh-zheek", en: "Educational tools", exFr: "Les outils pédagogiques numériques captivent l'attention.", exEn: "Digital educational tools capture attention.", target: "outils" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 15, fr: "L'apprentissage en ligne", phon: "lah-prahn-tee-sahzh", en: "Online learning", exFr: "L'apprentissage en ligne exige de l'auto-discipline.", exEn: "Online learning requires self-discipline.", target: "apprentissage" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 16, fr: "L'autonomie de l'élève", phon: "loh-toh-noh-mee", en: "Student autonomy", exFr: "L'autonomie de l'élève s'accroît avec la pédagogie active.", exEn: "Student autonomy grows with active pedagogy.", target: "autonomie" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 17, fr: "La fracture numérique éducative", phon: "lah frahk-toor", en: "Educational digital divide", exFr: "Il faut réduire la fracture numérique éducative.", exEn: "We must bridge the educational digital divide.", target: "fracture" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 18, fr: "Un cours interactif", phon: "ah koor an-tair-ahk-teef", en: "Interactive course", exFr: "Ce cours interactif stimule la participation.", exEn: "This interactive course stimulates participation.", target: "interactif" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 19, fr: "Le soutien scolaire", phon: "luh soo-tyahn skoh-lair", en: "Tutoring / Remedial teaching", exFr: "Le soutien scolaire aide les élèves en difficulté.", exEn: "Tutoring helps struggling students.", target: "soutien" },
        { deck: 2, deckTitle: "Deck 2 • E-Learning & Digital Literacy", id: 20, fr: "La plateforme éducative", phon: "lah plaht-fay-orm", en: "Educational platform", exFr: "Les devoirs sont déposés sur la plateforme éducative.", exEn: "Homework is submitted on the educational platform.", target: "plateforme" },

        // DECK 3: Lifelong Learning & Upskilling
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 21, fr: "La formation continue", phon: "lah for-mah-syon kohn-tee-noo", en: "Lifelong learning", exFr: "La formation continue permet de faire évoluer sa carrière.", exEn: "Continuing education allows one to advance their career.", target: "formation" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 22, fr: "La reconversion professionnelle", phon: "lah ruh-kohn-vair-syon", en: "Career transition", exFr: "Il a réussi sa reconversion professionnelle avec succès.", exEn: "He successfully completed his career transition.", target: "reconversion" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 23, fr: "La montée en compétences", phon: "lah mohn-tay ahn kohn-pay-tahnss", en: "Upskilling", exFr: "La montée en compétences est cruciale face à l'IA.", exEn: "Upskilling is crucial in the face of AI.", target: "compétences" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 24, fr: "L'apprentissage tout au long de la vie", phon: "lah-prahn-tee-sahzh", en: "Lifelong learning", exFr: "L'apprentissage tout au long de la vie est désormais la règle.", exEn: "Lifelong learning is now the rule.", target: "apprentissage" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 25, fr: "Un stage pratique", phon: "ah stahzh prah-teek", en: "Practical internship", exFr: "Un stage pratique valide la fin des études.", exEn: "A practical internship validates the end of studies.", target: "stage" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 26, fr: "L'alternance", phon: "Lahl-tair-nahnss", en: "Work-study program", exFr: "L'alternance combine théorie à l'école et pratique en entreprise.", exEn: "Work-study combines school theory and workplace practice.", target: "alternance" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 27, fr: "Les compétences clés", phon: "lay kohn-pay-tahnss klay", en: "Core competencies", exFr: "La résolution de problèmes fait partie des compétences clés.", exEn: "Problem-solving is one of the core competencies.", target: "compétences" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 28, fr: "La qualification professionnelle", phon: "lah kah-lee-fee-kah-syon", en: "Professional qualification", exFr: "Cette qualification professionnelle augmente l'employabilité.", exEn: "This professional qualification increases employability.", target: "qualification" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 29, fr: "Un bilan de compétences", phon: "ah bee-lahn", en: "Skills assessment", exFr: "Faire un bilan de compétences aide à réorienter son avenir.", exEn: "Doing a skills assessment helps reorient one's future.", target: "bilan" },
        { deck: 3, deckTitle: "Deck 3 • Lifelong Learning & Upskilling", id: 30, fr: "La validation des acquis", phon: "lah vah-lee-dah-syon", en: "Prior learning assessment", exFr: "La validation des acquis transforme l'expérience en diplôme.", exEn: "Prior learning assessment turns experience into a degree.", target: "validation" },

        // DECK 4: Pedagogy & Classroom Dynamics
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 31, fr: "La méthode pédagogique", phon: "lah may-thohd pay-dah-goh-zheek", en: "Teaching methodology", exFr: "L'enseignant adapte sa méthode pédagogique aux élèves.", exEn: "The teacher adapts their teaching methodology to students.", target: "méthode" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 32, fr: "Le travail collaboratif", phon: "luh trah-vahy koh-lah-boh-rah-teef", en: "Collaborative work", exFr: "Le travail collaboratif développe l'esprit d'équipe.", exEn: "Collaborative work develops team spirit.", target: "collaboratif" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 33, fr: "La pensée critique", phon: "lah pahn-say kree-teek", en: "Critical thinking", exFr: "L'école doit développer la pensée critique des futurs citoyens.", exEn: "Schools must develop critical thinking in future citizens.", target: "pensée critique" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 34, fr: "L'évaluation continue", phon: "lay-vah-loo-ah-syon", en: "Continuous assessment", exFr: "L'évaluation continue réduit le stress des examens finaux.", exEn: "Continuous assessment reduces final exam stress.", target: "évaluation" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 35, fr: "Le tutorat", phon: "luh too-toh-rah", en: "Mentoring / Tutoring", exFr: "Le tutorat entre pairs favorise l'intégration.", exEn: "Peer tutoring promotes integration.", target: "tutorat" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 36, fr: "La charge de travail", phon: "lah sharzh duh trah-vahy", en: "Workload", exFr: "Les étudiants réclament une meilleure répartition de la charge de travail.", exEn: "Students demand a better distribution of workload.", target: "charge" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 37, fr: "Les devoirs à la maison", phon: "lay duh-vwahr", en: "Homework", exFr: "L'efficacité des devoirs à la maison fait l'objet de débats.", exEn: "The effectiveness of homework is debated.", target: "devoirs" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 38, fr: "La discipline en classe", phon: "lah dee-see-pleen", en: "Classroom discipline", exFr: "Mantenir la discipline en classe est essentiel au calme.", exEn: "Maintaining classroom discipline is essential for quiet.", target: "discipline" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 39, fr: "L'épanouissement de l'élève", phon: "lay-pah-nweess-mahn", en: "Student fulfillment", exFr: "L'épanouissement de l'élève doit être au centre de l'école.", exEn: "Student fulfillment should be at the center of school.", target: "épanouissement" },
        { deck: 4, deckTitle: "Deck 4 • Pedagogy & Classroom Dynamics", id: 40, fr: "La motivation scolaire", phon: "lah moh-tee-vah-syon", en: "Academic motivation", exFr: "Encourager les efforts renforce la motivation scolaire.", exEn: "Encouraging effort reinforces academic motivation.", target: "motivation" },

        // DECK 5: Action Verbs
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 41, fr: "Enseigner", phon: "ahn-sayn-yay", en: "To teach", exFr: "Son rêve est d'enseigner la littérature à l'université.", exEn: "Her dream is to teach literature at university.", target: "enseigner" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 42, fr: "Apprendre", phon: "ah-prahn-druh", en: "To learn", exFr: "Il n'est jamais trop tard pour apprendre une nouvelle langue.", exEn: "It is never too late to learn a new language.", target: "apprendre" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 43, fr: "Se former", phon: "suh for-may", en: "To train oneself", exFr: "Il faut se former tout au long de sa vie professionnelle.", exEn: "One must train throughout their professional life.", target: "former" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 44, fr: "Transmettre", phon: "trahnss-meh-truh", en: "To pass on / transmit", exFr: "L'enseignant doit transmettre le savoir avec passion.", exEn: "The teacher must pass on knowledge with passion.", target: "transmettre" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 45, fr: "Évaluer", phon: "ay-vah-loo-ay", en: "To evaluate / assess", exFr: "Cet examen permet d'évaluer le niveau des candidats.", exEn: "This exam evaluates the candidates' level.", target: "évaluer" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 46, fr: "Mémoriser", phon: "may-moh-ree-zay", en: "To memorize", exFr: "Répéter régulièrement aide à mémoriser le vocabulaire.", exEn: "Repeating regularly helps memorize vocabulary.", target: "mémoriser" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 47, fr: "Obtenir", phon: "ohb-tneer", en: "To obtain", exFr: "Elle a travaillé dur pour obtenir son diplôme.", exEn: "She worked hard to obtain her degree.", target: "obtenir" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 48, fr: "Perfectionner", phon: "pair-fehk-syon-nay", en: "To perfect / refine", exFr: "Ce cours permet de perfectionner sa prononciation.", exEn: "This course allows one to perfect their pronunciation.", target: "perfectionner" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 49, fr: "Encadrer", phon: "ahn-kah-dray", en: "To supervise / guide", exFr: "Un professeur vient encadrer les étudiants en stage.", exEn: "A teacher comes to supervise students on internships.", target: "encadrer" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 50, fr: "Encourager", phon: "ahn-koo-rah-zhay", en: "To encourage", exFr: "Il faut encourager les initiatives chez les jeunes.", exEn: "We must encourage initiatives among young people.", target: "encourager" }
    ];

    const container = document.getElementById('vocab-container');
    let currentDeck = 0;

    vocabData.forEach(item => {
        if (item.deck !== currentDeck) {
            currentDeck = item.deck;
            const deckHeader = document.createElement('div');
            deckHeader.className = 'deck-header';
            deckHeader.innerHTML = `<span>${item.deckTitle}</span><span style="font-size: 0.85rem; color: var(--primary);">10 Words</span>`;
            container.appendChild(deckHeader);
        }

        const card = document.createElement('div');
        card.className = 'vocab-card-interactive';
        card.id = `card-${item.id}`;
        card.innerHTML = `
            <div class="card-top">
                <div>
                    <div class="word-fr">${item.id}. ${item.fr}</div>
                    <div class="word-phonetic">[${item.phon}]</div>
                    <div class="word-en">${item.en}</div>
                </div>
                <button class="speaker-btn" onclick="speakAsMarc('${item.fr}. ${item.exFr}')">🔊</button>
            </div>
            <div class="example-box">
                <div class="example-fr">💬 Example: « ${item.exFr} »</div>
                <div class="example-en">${item.exEn}</div>
            </div>
            <div class="mic-section">
                <button class="btn-mic" id="mic-btn-${item.id}" onclick="toggleRecord(${item.id}, '${item.target}')">
                    🎙️ Practice Saying "${item.fr}"
                </button>
            </div>
            <div class="feedback-container" id="feedback-${item.id}">
                <p><span class="coach-tag">👩‍💻 Élodie (Transcript):</span> <span id="transcript-${item.id}">...</span></p>
                <p><span class="coach-tag">👩‍⚖️ Léa (Evaluation):</span> <span id="eval-${item.id}">...</span></p>
            </div>
        `;
        container.appendChild(card);
    });

    let recognition, isRecording = false, activeCardId = null, activeTarget = "";

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR'; recognition.continuous = false; recognition.interimResults = false;

        recognition.onresult = (event) => {
            const spokenText = event.results[0][0].transcript.toLowerCase();
            processCoachFeedback(activeCardId, spokenText, activeTarget);
        };

        recognition.onend = () => {
            if (activeCardId) document.getElementById(`mic-btn-${activeCardId}`).classList.remove('recording');
            isRecording = false;
        };
    }

    function toggleRecord(id, targetWord) {
        if (!recognition) return alert("Requires Google Chrome or Microsoft Edge.");
        activeCardId = id; activeTarget = targetWord.toLowerCase();
        const btn = document.getElementById(`mic-btn-${id}`);
        if (isRecording) { recognition.stop(); } else {
            document.getElementById(`feedback-${id}`).style.display = "block";
            document.getElementById(`transcript-${id}`).innerText = "Listening...";
            document.getElementById(`eval-${id}`).innerText = "Evaluating...";
            btn.classList.add('recording'); isRecording = true; recognition.start();
        }
    }

    function processCoachFeedback(id, spokenText, target) {
        document.getElementById(`transcript-${id}`).innerText = `"${spokenText}"`;
        const evalSpan = document.getElementById(`eval-${id}`);
        let leaSpokenMessage = "";

        if (spokenText.includes(target) || target.includes(spokenText)) {
            evalSpan.innerHTML = "✅ <strong>Parfait !</strong> Pronunciation matched closely!";
            evalSpan.style.color = "#065F46";
            leaSpokenMessage = "Parfait ! Excellent travail.";
        } else {
            evalSpan.innerHTML = `⚠️ <strong>Close try!</strong> Detected <em>"${spokenText}"</em>. Click 🔊 to listen to Marc again.`;
            evalSpan.style.color = "#991B1B";
            leaSpokenMessage = "Presque ! Réécoutez Marc et réessayez.";
        }
        speakAsLea(leaSpokenMessage);
    }

    function speakAsMarc(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'fr-FR'; speech.rate = 0.85; speech.pitch = 0.9;
            window.speechSynthesis.speak(speech);
        }
    }

    function speakAsLea(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'fr-FR'; speech.rate = 0.92; speech.pitch = 1.25;
            window.speechSynthesis.speak(speech);
        }
    }
</script>
</body>
</html>
