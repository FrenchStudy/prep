<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCF 50 Words • Justice & Droits Citoyens</title>
    <style>
        :root {
            --primary: #DC2626;
            --dark-red: #B91C1C;
            --dark: #0F172A;
            --light: #F8FAFC;
            --green: #10B981;
            --accent: #EF4135;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #E2E8F0; color: var(--dark); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: white; max-width: 900px; width: 100%; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); padding: 25px; border-top: 8px solid var(--primary); }
        .header { background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary) 100%); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.8rem; margin-bottom: 4px; }
        .coaches-banner { display: flex; gap: 15px; background: #FEF2F2; border-left: 5px solid var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 25px; align-items: center; }
        .deck-header { color: var(--dark-red); font-size: 1.3rem; margin: 30px 0 15px 0; border-bottom: 2px solid #CBD5E1; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .vocab-card-interactive { background: var(--light); border: 2px solid #CBD5E1; border-radius: 16px; padding: 18px; margin-bottom: 16px; transition: all 0.2s ease; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .word-fr { font-weight: bold; color: var(--dark-red); font-size: 1.25rem; }
        .word-phonetic { font-size: 0.85rem; color: #DC2626; margin-top: 2px; }
        .word-en { font-size: 0.95rem; color: #64748B; margin-top: 2px; }
        .speaker-btn { font-size: 1.3rem; background: #E2E8F0; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .speaker-btn:hover { background: #CBD5E1; }
        .example-box { background: white; border-left: 4px solid var(--primary); padding: 10px 14px; border-radius: 6px; margin: 10px 0; font-size: 0.95rem; }
        .example-fr { font-weight: 600; color: var(--dark); }
        .example-en { font-size: 0.85rem; color: #64748B; margin-top: 2px; }
        .mic-section { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
        .btn-mic { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .btn-mic.recording { background: var(--accent); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .feedback-container { margin-top: 12px; background: #ECFDF5; border: 1px solid var(--green); padding: 12px; border-radius: 8px; display: none; font-size: 0.9rem; }
        .coach-tag { font-weight: bold; color: #065F46; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🚨 TCF Canada • 50 Interactive Justice Words</h1>
        <p>État de Droit, Devoir Civique, Réinsertion & Cyberdroit</p>
    </div>

    <div class="coaches-banner">
        <span style="font-size: 2rem;">👨‍💼👩‍💻👩‍⚖️</span>
        <div>
            <strong>Interactive Voice Coaching:</strong><br>
            <span style="color: #475569; font-size: 0.9rem;">
                Click 🔊 to hear <strong>Marc</strong> read the example sentence. Click 🎙️ to practice speaking—<strong>Élodie</strong> transcribes your voice and <strong>Léa speaks back with live feedback!</strong>
            </span>
        </div>
    </div>

    <div id="vocab-container"></div>
</div>

<script>
    const vocabData = [
        // DECK 1: Legal System & Rights
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 1, fr: "L'état de droit", phon: "lay-tah duh drwah", en: "Rule of law", exFr: "Dans un état de droit, nul n'est au-dessus des lois.", exEn: "In a rule of law state, no one is above the law.", target: "état de droit" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 2, fr: "La présomption d'innocence", phon: "lah pray-zohnp-syon", en: "Presumption of innocence", exFr: "La présomption d'innocence s'applique jusqu'au jugement final.", exEn: "Presumption of innocence applies until final judgment.", target: "présomption" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 3, fr: "Le droit à un procès équitable", phon: "luh drwah ah nah proh-seh", en: "Right to a fair trial", exFr: "Chaque accusé bénéficie du droit à un procès équitable.", exEn: "Every defendant benefits from the right to a fair trial.", target: "procès" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 4, fr: "L'accès à la justice", phon: "lahk-seh ah lah zhoos-teess", en: "Access to justice", exFr: "L'accès à la justice doit être garanti quel que soit le revenu.", exEn: "Access to justice must be guaranteed regardless of income.", target: "accès" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 5, fr: "L'aide juridique", phon: "lehd zhoo-ree-deek", en: "Legal aid", exFr: "L'aide juridique permet aux plus démunis d'avoir un avocat.", exEn: "Legal aid allows low-income individuals to have a lawyer.", target: "aide" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 6, fr: "Les libertés fondamentales", phon: "lay lee-bair-tay", en: "Fundamental freedoms", exFr: "La constitution protège nos libertés fondamentales.", exEn: "The constitution protects our fundamental freedoms.", target: "libertés" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 7, fr: "La protection de la vie privée", phon: "lah proh-tehk-syon", en: "Protection of privacy", exFr: "La loi encadre la protection de la vie privée sur Internet.", exEn: "The law regulates privacy protection online.", target: "vie privée" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 8, fr: "La jurisprudence", phon: "lah zhoo-reess-proo-dahnss", en: "Case law / Jurisprudence", exFr: "Les décisions passées créent une jurisprudence pour l'avenir.", exEn: "Past decisions set case law for the future.", target: "jurisprudence" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 9, fr: "Le recours juridique", phon: "luh ruh-koor zhoo-ree-deek", en: "Legal recourse / Appeal", exFr: "Le citoyen peut déposer un recours juridique devant le tribunal.", exEn: "Citizens can file a legal recourse in court.", target: "recours" },
        { deck: 1, deckTitle: "Deck 1 • Legal System & Rights", id: 10, fr: "L'égalité devant la loi", phon: "lay-gah-lee-tay", en: "Equality before the law", exFr: "L'égalité devant la loi est un principe républicain de base.", exEn: "Equality before the law is a basic republican principle.", target: "égalité" },

        // DECK 2: Civic Duties & Participation
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 11, fr: "Le devoir civique", phon: "luh duh-vwahr see-veek", en: "Civic duty", exFr: "Voter lors des élections est perçu comme un devoir civique.", exEn: "Voting in elections is viewed as a civic duty.", target: "devoir" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 12, fr: "Le droit de vote", phon: "luh drwah duh voht", en: "Right to vote", exFr: "Obtenir le droit de vote marque l'accès à la pleine citoyenneté.", exEn: "Gaining the right to vote marks full citizenship access.", target: "vote" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 13, fr: "L'engagement citoyen", phon: "lahn-gahzh-mahn", en: "Civic engagement", exFr: "L'engagement citoyen se manifeste dans le bénévolat local.", exEn: "Civic engagement shows through local volunteering.", target: "engagement" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 14, fr: "La participation démocratique", phon: "lah par-tee-see-pah-syon", en: "Democratic participation", exFr: "Les conseils de quartier stimulent la participation démocratique.", exEn: "Neighborhood councils stimulate democratic participation.", target: "participation" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 15, fr: "La désobéissance civile", phon: "lah day-soh-bay-ee-sahnss", en: "Civil disobedience", exFr: "La désobéissance civile utilise des actions pacifiques pour protester.", exEn: "Civil disobedience uses peaceful action to protest.", target: "désobéissance" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 16, fr: "Le bénévolat communautaire", phon: "luh bay-nay-voh-lah", en: "Community volunteering", exFr: "Le bénévolat communautaire aide à renforcer les liens sociaux.", exEn: "Community volunteering helps strengthen social bonds.", target: "bénévolat" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 17, fr: "La responsabilité citoyenne", phon: "lah rehss-pohn-sah-bee-lee-tay", en: "Citizen responsibility", exFr: "Protéger l'environnement est une responsabilité citoyenne.", exEn: "Protecting the environment is a citizen responsibility.", target: "responsabilité" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 18, fr: "La liberté de rassemblement", phon: "lah lee-bair-tay", en: "Freedom of assembly", exFr: "La liberté de rassemblement permet d'organiser des manifestations.", exEn: "Freedom of assembly allows organizing demonstrations.", target: "rassemblement" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 19, fr: "Le débat public", phon: "luh day-bah poo-bleek", en: "Public debate", exFr: "Le débat public permet d'éclairer les choix du gouvernement.", exEn: "Public debate clarifies government choices.", target: "débat" },
        { deck: 2, deckTitle: "Deck 2 • Civic Duties & Participation", id: 20, fr: "La pétition citoyenne", phon: "lah pay-tee-syon", en: "Citizens' petition", exFr: "Lancer une pétition citoyenne attire l'attention des élus.", exEn: "Launching a citizens' petition catches elected officials' attention.", target: "pétition" },

        // DECK 3: Justice Reform & Crime Prevention
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 21, fr: "La réinsertion sociale", phon: "lah ray-ahn-sair-syon", en: "Social rehabilitation", exFr: "La réinsertion sociale des anciens détenus réduit la récidive.", exEn: "Social rehabilitation of former inmates reduces recidivism.", target: "réinsertion" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 22, fr: "La prévention de la criminalité", phon: "lah pray-vahn-syon", en: "Crime prevention", exFr: "Investir dans la jeunesse est une clé de la prévention de la criminalité.", exEn: "Investing in youth is key to crime prevention.", target: "prévention" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 23, fr: "La justice restaurative", phon: "lah zhoos-teess", en: "Restorative justice", exFr: "La justice restaurative favorise le dialogue entre victime et auteur.", exEn: "Restorative justice promotes dialogue between victim and offender.", target: "restaurative" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 24, fr: "La lutte contre l'impunité", phon: "lah loot kohn-truh", en: "Fight against impunity", exFr: "La lutte contre l'impunité garantit que les crimes sont punis.", exEn: "The fight against impunity guarantees crimes are punished.", target: "impunité" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 25, fr: "Les peines alternatives", phon: "lay pehn ahl-tair-nah-teev", en: "Alternative sentencing", exFr: "Le travail d'intérêt général est l'une des peines alternatives.", exEn: "Community service is one alternative sentencing option.", target: "peines" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 26, fr: "La protection des victimes", phon: "lah proh-tehk-syon", en: "Victim protection", exFr: "Un fonds d'État assure la protection des victimes de crimes.", exEn: "A state fund ensures victim protection from crimes.", target: "victimes" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 27, fr: "Le contrôle judiciaire", phon: "luh kohn-trohl zhoo-dee-syair", en: "Judicial supervision", exFr: "Le suspect est placé sous contrôle judiciaire en attendant le procès.", exEn: "The suspect is placed under judicial supervision awaiting trial.", target: "contrôle" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 28, fr: "La médiation pénale", phon: "lah may-dyah-syon pay-nahl", en: "Penal mediation", exFr: "La médiation pénale permet de régler de petits litiges sans procès.", exEn: "Penal mediation allows settling small disputes without a trial.", target: "médiation" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 29, fr: "La sécurité publique", phon: "lah say-koo-ree-tay poo-bleek", en: "Public safety", exFr: "Les forces de l'ordre veillent à la sécurité publique.", exEn: "Law enforcement ensures public safety.", target: "sécurité" },
        { deck: 3, deckTitle: "Deck 3 • Justice Reform & Crime Prevention", id: 30, fr: "L'impartialité des juges", phon: "leem-par-syah-lee-tay", en: "Judicial impartiality", exFr: "L'impartialité des juges garantit des verdict équitables.", exEn: "Judicial impartiality guarantees fair verdicts.", target: "impartialité" },

        // DECK 4: Consumer & Digital Rights
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 31, fr: "La protection des données", phon: "lah proh-tehk-syon", en: "Personal data protection", exFr: "Le RGPD renforce la protection des données personnelles en Europe.", exEn: "GDPR reinforces personal data protection in Europe.", target: "données" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 32, fr: "Le consentement éclairé", phon: "luh kohn-sahn-tmahn", en: "Informed consent", exFr: "L'utilisateur doit donner son consentement éclairé avant tout suivi.", exEn: "Users must give informed consent before any tracking.", target: "consentement" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 33, fr: "Le droit à l'oubli", phon: "luh drwah ah loo-blee", en: "Right to be forgotten", exFr: "Le droit à l'oubli permet d'effacer ses traces numériques anciennes.", exEn: "The right to be forgotten erases old digital traces.", target: "oubli" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 34, fr: "La propriété intellectuelle", phon: "lah proh-pree-ay-tay", en: "Intellectual property", exFr: "Protéger la propriété intellectuelle encourage la création d'œuvres.", exEn: "Protecting intellectual property encourages creative works.", target: "intellectuelle" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 35, fr: "La cybercriminalité", phon: "lah see-bair-kree-mee-nah-lee-tay", en: "Cybercrime", exFr: "La cybercriminalité cible les banques et les données de santé.", exEn: "Cybercrime targets banks and healthcare data.", target: "cybercriminalité" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 36, fr: "La défense des consommateurs", phon: "lah day-fahnss", en: "Consumer defense", exFr: "Cette association agit pour la défense des consommateurs floués.", exEn: "This association acts for the defense of cheated consumers.", target: "consommateurs" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 37, fr: "La transparence algorithmique", phon: "lah trahnss-pah-rahnss", en: "Algorithmic transparency", exFr: "Exiger la transparence algorithmique évite les discriminations virtuelles.", exEn: "Demanding algorithmic transparency avoids virtual discrimination.", target: "transparence" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 38, fr: "La liberté d'expression en ligne", phon: "lah lee-bair-tay", en: "Online freedom of expression", exFr: "Protéger la liberté d'expression en ligne exige de modérer la haine.", exEn: "Protecting online freedom of expression requires moderating hate.", target: "expression" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 39, fr: "Les droits des usagers", phon: "lay drwah day zoo-zah-zhay", en: "Users' rights", exFr: "Une charte rappelle les droits des usagers des transports publics.", exEn: "A charter outlines the rights of public transport users.", target: "usagers" },
        { deck: 4, deckTitle: "Deck 4 • Consumer & Digital Rights", id: 40, fr: "La responsabilité numérique", phon: "lah rehss-pohn-sah-bee-lee-tay", en: "Digital responsibility", exFr: "Chaque internaute doit exercer une responsabilité numérique consciente.", exEn: "Every internet user should practice conscious digital responsibility.", target: "numérique" },

        // DECK 5: Action Verbs
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 41, fr: "Défendre", phon: "day-fahn-druh", en: "To defend", exFr: "L'avocat va défendre les intérêts de son client devant le juge.", exEn: "The lawyer will defend his client's interests before the judge.", target: "défendre" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 42, fr: "Revendiquer", phon: "ruh-vahn-dee-kay", en: "To claim / demand", exFr: "Les citoyens manifestent pour revendiquer plus de justice sociale.", exEn: "Citizens demonstrate to demand more social justice.", target: "revendiquer" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 43, fr: "Juger", phon: "zhoo-zhay", en: "To judge", exFr: "Le tribunal va juger l'affaire à huis clos.", exEn: "The court will judge the case behind closed doors.", target: "juger" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 44, fr: "Protéger", phon: "proh-tay-zhay", en: "To protect", exFr: "La constitution vise à protéger les droits de chaque individu.", exEn: "The constitution aims to protect every individual's rights.", target: "protéger" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 45, fr: "Respecter", phon: "rehss-pehk-tay", en: "To respect / abide by", exFr: "Tous les citoyens sont tenus de respecter le code de la route.", exEn: "All citizens are required to abide by the road rules.", target: "respecter" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 46, fr: "Condamner", phon: "kohn-dah-nay", en: "To condemn / sentence", exFr: "Le juge a décidé de condamner l'accusé à une amende.", exEn: "The judge decided to sentence the accused to a fine.", target: "condamner" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 47, fr: "Sanctionner", phon: "sahnk-syon-nay", en: "To penalize / sanction", exFr: "La loi vient sanctionner l'usage illégal de données privées.", exEn: "The law penalizes illegal use of private data.", target: "sanctionner" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 48, fr: "Légiférer", phon: "lay-zhee-fay-ray", en: "To legislate", exFr: "Le Parlement doit légiférer sur l'intelligence artificielle.", exEn: "Parliament must legislate on artificial intelligence.", target: "légiférer" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 49, fr: "Plaider", phon: "pleh-day", en: "To plead / argue", exFr: "L'avocate va plaider la légitime défense pour sa cliente.", exEn: "The lawyer will argue self-defense for her client.", target: "plaider" },
        { deck: 5, deckTitle: "Deck 5 • Key Action Verbs", id: 50, fr: "Réformer", phon: "ray-for-may", en: "To reform", exFr: "Le gouvernement propose de réformer le code pénal.", exEn: "The government proposes reforming the penal code.", target: "réformer" }
    ];

    const container = document.getElementById('vocab-container');
    let currentDeck = 0;

    vocabData.forEach(item => {
        if (item.deck !== currentDeck) {
            currentDeck = item.deck;
            const deckHeader = document.createElement('div');
            deckHeader.className = 'deck-header';
            deckHeader.innerHTML = `<span>${item.deckTitle}</span><span style="font-size: 0.85rem; color: var(--primary);">10 Words</span>`;
            container.appendChild(deckHeader);
        }

        const card = document.createElement('div');
        card.className = 'vocab-card-interactive';
        card.id = `card-${item.id}`;
        card.innerHTML = `
            <div class="card-top">
                <div>
                    <div class="word-fr">${item.id}. ${item.fr}</div>
                    <div class="word-phonetic">[${item.phon}]</div>
                    <div class="word-en">${item.en}</div>
                </div>
                <button class="speaker-btn" onclick="speakAsMarc('${item.fr}. ${item.exFr}')">🔊</button>
            </div>
            <div class="example-box">
                <div class="example-fr">💬 Example: « ${item.exFr} »</div>
                <div class="example-en">${item.exEn}</div>
            </div>
            <div class="mic-section">
                <button class="btn-mic" id="mic-btn-${item.id}" onclick="toggleRecord(${item.id}, '${item.target}')">
                    🎙️ Practice Saying "${item.fr}"
                </button>
            </div>
            <div class="feedback-container" id="feedback-${item.id}">
                <p><span class="coach-tag">👩‍💻 Élodie (Transcript):</span> <span id="transcript-${item.id}">...</span></p>
                <p><span class="coach-tag">👩‍⚖️ Léa (Evaluation):</span> <span id="eval-${item.id}">...</span></p>
            </div>
        `;
        container.appendChild(card);
    });

    let recognition, isRecording = false, activeCardId = null, activeTarget = "";

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR'; recognition.continuous = false; recognition.interimResults = false;

        recognition.onresult = (event) => {
            const spokenText = event.results[0][0].transcript.toLowerCase();
            processCoachFeedback(activeCardId, spokenText, activeTarget);
        };

        recognition.onend = () => {
            if (activeCardId) document.getElementById(`mic-btn-${activeCardId}`).classList.remove('recording');
            isRecording = false;
        };
    }

    function toggleRecord(id, targetWord) {
        if (!recognition) return alert("Requires Google Chrome or Microsoft Edge.");
        activeCardId = id; activeTarget = targetWord.toLowerCase();
        const btn = document.getElementById(`mic-btn-${id}`);
        if (isRecording) { recognition.stop(); } else {
            document.getElementById(`feedback-${id}`).style.display = "block";
            document.getElementById(`transcript-${id}`).innerText = "Listening...";
            document.getElementById(`eval-${id}`).innerText = "Evaluating...";
            btn.classList.add('recording'); isRecording = true; recognition.start();
        }
    }

    function processCoachFeedback(id, spokenText, target) {
        document.getElementById(`transcript-${id}`).innerText = `"${spokenText}"`;
        const evalSpan = document.getElementById(`eval-${id}`);
        let leaSpokenMessage = "";

        if (spokenText.includes(target) || target.includes(spokenText)) {
            evalSpan.innerHTML = "✅ <strong>Parfait !</strong> Pronunciation matched closely!";
            evalSpan.style.color = "#065F46";
            leaSpokenMessage = "Parfait ! Excellent travail.";
        } else {
            evalSpan.innerHTML = `⚠️ <strong>Close try!</strong> Detected <em>"${spokenText}"</em>. Click 🔊 to listen to Marc again.`;
            evalSpan.style.color = "#991B1B";
            leaSpokenMessage = "Presque ! Réécoutez Marc et réessayez.";
        }
        speakAsLea(leaSpokenMessage);
    }

    function speakAsMarc(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'fr-FR'; speech.rate = 0.85; speech.pitch = 0.9;
            window.speechSynthesis.speak(speech);
        }
    }

    function speakAsLea(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'fr-FR'; speech.rate = 0.92; speech.pitch = 1.25;
            window.speechSynthesis.speak(speech);
        }
    }
